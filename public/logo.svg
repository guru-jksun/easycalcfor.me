<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="eq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef6c40"/>
      <stop offset="100%" stop-color="#e05530"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <filter id="eqShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#d4442088"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <!-- Inner subtle border -->
  <rect x="8" y="8" width="496" height="496" rx="102" ry="102" fill="none" stroke="#d0d0d0" stroke-width="1.5"/>
  <!-- Left: × button (top) -->
  <circle cx="185" cy="192" r="72" fill="white" filter="url(#shadow)"/>
  <line x1="155" y1="162" x2="215" y2="222" stroke="#3a3a3a" stroke-width="15" stroke-linecap="round"/>
  <line x1="215" y1="162" x2="155" y2="222" stroke="#3a3a3a" stroke-width="15" stroke-linecap="round"/>
  <!-- Left: ÷ button (bottom) -->
  <circle cx="185" cy="348" r="72" fill="white" filter="url(#shadow)"/>
  <line x1="148" y1="348" x2="222" y2="348" stroke="#3a3a3a" stroke-width="15" stroke-linecap="round"/>
  <circle cx="185" cy="318" r="8.5" fill="#3a3a3a"/>
  <circle cx="185" cy="378" r="8.5" fill="#3a3a3a"/>
  <!-- Right: = pill button (orange, spanning both rows) -->
  <rect x="280" y="120" width="144" height="300" rx="72" ry="72" fill="url(#eq)" filter="url(#eqShadow)"/>
  <line x1="318" y1="256" x2="390" y2="256" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <line x1="318" y1="292" x2="390" y2="292" stroke="white" stroke-width="16" stroke-linecap="round"/>
</svg>
